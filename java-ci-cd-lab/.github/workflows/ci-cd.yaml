name: Java CI pipeline

on:
  push:
   branches:
    - main

jobs:
 build:
   runs-on: ubuntu-latest

   steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set Up JDk
      uses: actions/setup-java@v4
      with: 
        distribution: 'temurin'
        java-version: '21'

    - name: Compile Java Program
      run: javac Main.java

    - name: Run Java Program
      run: java Main 
